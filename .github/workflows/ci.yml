name: CI
on:
  push:
    branches: ["**"]
  pull_request:
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Build reports
        run: npm run build
      - name: Validate (round-trip + render smoke tests)
        run: npm test
