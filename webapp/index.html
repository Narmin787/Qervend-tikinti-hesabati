<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hesabat Generatoru</title>
<style>
:root{--ink:#1F2440;--muted:#6B7280;--border:#E6E9EF;--page:#F4F6F9;--card:#fff;--blue:#2A6FA8;--good:#1FA67E;--risk:#E0483D;--radius:10px}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--page);color:var(--ink);font-size:14px}
.top{background:linear-gradient(90deg,#1F3F66,#2A6FA8);color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.top h1{font-size:16px;margin:0;letter-spacing:.04em;text-transform:uppercase}
.top .modes{display:flex;gap:6px}
.top .modes button{font:inherit;font-weight:700;border:1px solid rgba(255,255,255,.5);background:transparent;color:#fff;padding:7px 12px;border-radius:8px;cursor:pointer}
.top .modes button.on{background:#fff;color:var(--blue)}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:16px;max-width:1500px;margin:0 auto}
@media(max-width:1000px){.layout{grid-template-columns:1fr}}
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.panel h2{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#9AA1AB;margin:0 0 10px}
.drop{border:2px dashed #cfd5e0;border-radius:10px;padding:18px;text-align:center;color:var(--muted);cursor:pointer;background:#fbfcfe}
.drop.drag{border-color:var(--blue);background:#f2f8fe}
.files{font-size:12px;color:var(--muted);margin-top:8px}
.btn{font:inherit;font-weight:700;border:1px solid var(--border);background:var(--card);color:var(--ink);padding:9px 14px;border-radius:8px;cursor:pointer}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.good{background:var(--good);color:#fff;border-color:var(--good)}
.btn:disabled{opacity:.5;cursor:default}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
details{border:1px solid var(--border);border-radius:8px;margin-bottom:8px}
details>summary{cursor:pointer;font-weight:700;padding:9px 12px;font-size:13px}
details>div{padding:8px 12px;border-top:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{border:1px solid var(--border);padding:3px 5px;text-align:left}
th{background:#f8fafc;color:var(--muted);font-weight:600;font-size:11px}
input,textarea,select{font:inherit;font-size:12.5px;width:100%;border:1px solid var(--border);border-radius:5px;padding:4px 6px;background:#fff}
td input{border:none;padding:2px 3px}
td input:focus{outline:1px solid var(--blue)}
.kv{display:grid;grid-template-columns:170px 1fr;gap:5px 8px;align-items:center}
.kv label{font-size:11.5px;color:var(--muted)}
.mini{font-size:11px;color:var(--muted);padding:3px 7px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer}
.preview-wrap{position:sticky;top:16px}
iframe{width:100%;height:78vh;border:1px solid var(--border);border-radius:8px;background:#fff}
.note{font-size:11.5px;color:var(--muted);margin:6px 0}
.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.status{font-size:12px;margin-left:auto}
.swatch{display:flex;align-items:center;gap:6px}
.swatch input[type=color]{width:34px;height:26px;padding:0;border:1px solid var(--border)}
.err{color:var(--risk);font-weight:600}
.ok{color:var(--good);font-weight:600}
</style>
</head>
<body>
<div class="top">
  <h1>📊 Tikinti Hesabatı Generatoru</h1>
  <div class="modes">
    <button id="mNew" class="on">＋ Yeni hesabat</button>
    <button id="mUpd">✎ Mövcudu yenilə</button>
  </div>
</div>

<div class="layout">
  <!-- LEFT: input + editor -->
  <div>
    <div class="panel" id="inputPanel">
      <h2>1 · Xam fayllar</h2>
      <div id="updPick" style="display:none;margin-bottom:10px">
        <label class="note">Yenilənəcək şəhər:</label>
        <div class="row"><select id="citySel"></select><button class="btn" id="loadCity">Yüklə</button></div>
      </div>
      <div class="drop" id="drop">Excel (.xlsx) və Primavera PDF fayllarını bura atın və ya klikləyin
        <input type="file" id="fileInput" multiple accept=".xlsx,.xls,.pdf" style="display:none"></div>
      <div class="files" id="fileList"></div>
      <div class="row" style="margin-top:10px">
        <button class="btn primary" id="parseBtn" disabled>⚙ Fayllardan oxu</button>
        <button class="btn" id="blankBtn">Boşdan başla</button>
        <span class="status" id="parseStatus"></span>
      </div>
    </div>

    <div class="panel" style="margin-top:14px">
      <h2>2 · Məlumatı redaktə et</h2>
      <div id="editor"></div>
    </div>
  </div>

  <!-- RIGHT: preview + actions -->
  <div>
    <div class="panel preview-wrap">
      <h2>3 · Önizləmə</h2>
      <div class="row"><button class="btn" id="refreshBtn">↻ Önizləməni yenilə</button>
        <span class="note">Dəyişiklikdən sonra yeniləyin.</span></div>
      <iframe id="preview"></iframe>

      <div class="bar">
        <button class="btn" id="dlXlsx">⬇ source.xlsx</button>
        <button class="btn" id="dlData">⬇ data.js</button>
      </div>
      <div class="bar">
        <input id="cityName" placeholder="Şəhər/kənd adı (məs. Qərvənd kəndi)" style="flex:1;min-width:160px">
        <input id="pwd" type="password" placeholder="Deploy parolu" style="width:150px">
        <button class="btn good" id="deployBtn">🚀 Deploy (GitHub + Vercel)</button>
      </div>
      <div class="status" id="deployStatus" style="margin-top:8px"></div>
      <div class="note">Deploy → GitHub-a göndərir, Vercel 1-5 dəqiqəyə canlı versiyanı yeniləyir.</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script src="./parsers.js"></script>
<script src="./xlsx-build.js"></script>
<script src="./app.js"></script>
</body>
</html>
